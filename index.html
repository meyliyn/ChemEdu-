<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ChemEdu | Acid Bases ChemEdu - Kelompok 8</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #e0f2fe 0%, #fae8ff 50%, #d9f99d 100%); background-attachment: fixed; }

    /* ===== AUTH OVERLAY ===== */
    #auth-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: linear-gradient(135deg, #1e1b4b 0%, #4c1d95 50%, #6d28d9 100%);
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
    }
    #auth-overlay.hidden { display: none; }
    .auth-card {
      background: rgba(255,255,255,0.97);
      border-radius: 2rem;
      box-shadow: 0 25px 60px rgba(0,0,0,0.4);
      width: 100%; max-width: 440px;
      padding: 2.5rem 2rem;
      position: relative;
      overflow: hidden;
    }
    .auth-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 5px;
      background: linear-gradient(90deg, #ec4899, #8b5cf6, #06b6d4);
    }
    .auth-tab {
      display: flex; border-radius: 1rem; background: #f1f5f9;
      padding: 4px; margin-bottom: 1.5rem; gap: 4px;
    }
    .auth-tab-btn {
      flex: 1; padding: 10px; border-radius: 12px; font-size: 14px;
      font-weight: 600; border: none; cursor: pointer; transition: all 0.25s;
      background: transparent; color: #64748b;
    }
    .auth-tab-btn.active {
      background: white; color: #7c3aed;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
    .auth-form { display: none; }
    .auth-form.active { display: block; animation: fadeInUp 0.3s ease; }
    @keyframes fadeInUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    .auth-input {
      width: 100%; padding: 12px 16px;
      border: 2px solid #e2e8f0; border-radius: 12px;
      font-size: 14px; transition: border-color 0.2s;
      font-family: 'Inter', sans-serif;
      margin-bottom: 12px; display: block;
    }
    .auth-input:focus { outline: none; border-color: #8b5cf6; }
    .auth-input-group { position: relative; margin-bottom: 12px; }
    .auth-input-group .auth-input { margin-bottom: 0; }
    .auth-input-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: #94a3b8; pointer-events: none;
    }
    .auth-input-group .auth-input { padding-left: 40px; }
    .auth-btn {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #7c3aed, #ec4899);
      color: white; border: none; border-radius: 14px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      transition: all 0.2s; font-family: 'Inter', sans-serif;
      margin-top: 6px;
    }
    .auth-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(124,58,237,0.4); }
    .auth-btn:active { transform: translateY(0); }
    .auth-error {
      background: #fef2f2; border: 1px solid #fca5a5;
      color: #b91c1c; padding: 10px 14px; border-radius: 10px;
      font-size: 13px; margin-bottom: 12px; display: none;
    }
    .auth-success {
      background: #f0fdf4; border: 1px solid #86efac;
      color: #15803d; padding: 10px 14px; border-radius: 10px;
      font-size: 13px; margin-bottom: 12px; display: none;
    }
    .auth-divider { text-align: center; color: #94a3b8; font-size: 12px; margin: 16px 0 12px; position: relative; }
    .auth-divider::before, .auth-divider::after {
      content: ''; position: absolute; top: 50%; width: 42%; height: 1px;
      background: #e2e8f0;
    }
    .auth-divider::before { left: 0; }
    .auth-divider::after { right: 0; }
    .role-picker { display: flex; gap: 8px; margin-bottom: 14px; }
    .role-option {
      flex: 1; padding: 10px 8px; border: 2px solid #e2e8f0;
      border-radius: 12px; text-align: center; cursor: pointer;
      transition: all 0.2s; font-size: 13px;
    }
    .role-option:hover { border-color: #8b5cf6; }
    .role-option.selected { border-color: #8b5cf6; background: #f3e8ff; }
    .role-option .role-emoji { font-size: 22px; display: block; margin-bottom: 4px; }
    .auth-hint { background: #faf5ff; border-radius: 10px; padding: 10px 12px; font-size: 11px; color: #6b7280; margin-top: 14px; }
    .auth-hint strong { color: #7c3aed; }
    .password-toggle {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      cursor: pointer; color: #94a3b8; background: none; border: none; padding: 2px;
    }
    .particles { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
    .particle {
      position: absolute; border-radius: 50%;
      background: rgba(255,255,255,0.12);
      animation: float linear infinite;
    }
    @keyframes float {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100px) scale(1); opacity: 0; }
    }

    /* ===== MAIN APP LAYOUT ===== */
    .sidebar {
      background: linear-gradient(145deg, #1e1b4b 0%, #2e1065 100%);
      transition: width 0.2s ease;
      box-shadow: 4px 0 25px rgba(0,0,0,0.2);
      overflow-y: auto; overflow-x: visible;
      position: relative; width: 280px; min-width: 70px; max-width: 400px;
    }
    .sidebar.collapsed { width: 70px !important; min-width: 70px !important; }
    .sidebar.collapsed .sidebar-item span,
    .sidebar.collapsed .logo-text,
    .sidebar.collapsed .user-info-text { display: none; }
    .sidebar.collapsed .sidebar-item { justify-content: center; gap: 0; padding: 12px 0; margin: 6px 8px; }
    .sidebar-item {
      display: flex; align-items: center; gap: 12px; padding: 12px 20px;
      margin: 6px 12px; border-radius: 14px; transition: all 0.2s;
      color: #c4b5fd; cursor: pointer; white-space: nowrap;
    }
    .sidebar-item:hover { background: #4c1d95; color: white; transform: translateX(3px); }
    .sidebar-item.active { background: #8b5cf6; color: white; box-shadow: 0 6px 14px rgba(139,92,246,0.5); }
    .resize-handle { position: absolute; right: -5px; top: 0; width: 8px; height: 100%; cursor: ew-resize; background: transparent; z-index: 100; }
    .resize-handle:hover { background: rgba(139,92,246,0.5); }
    .toggle-sidebar-btn {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #4c1d95; border-radius: 30px; padding: 8px 12px;
      color: white; cursor: pointer; z-index: 101; font-size: 12px; white-space: nowrap;
    }
    .sidebar.collapsed .toggle-sidebar-btn { left: 35px; transform: none; writing-mode: vertical-rl; padding: 12px 6px; }
    .page { display: none; animation: fadeIn 0.35s ease; }
    .page.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .glass-card { background: rgba(255,255,255,0.85); backdrop-filter: blur(8px); border-radius: 1.5rem; border: 1px solid rgba(255,255,255,0.5); box-shadow: 0 8px 25px -6px rgba(0,0,0,0.1); }
    .theory-card { cursor: pointer; transition: all 0.2s; background: white; border-radius: 1rem; }
    .theory-card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px -8px rgba(0,0,0,0.2); }
    .detail-content { display: none; margin-top: 12px; padding: 12px; background: #f8fafc; border-radius: 1rem; border-left: 4px solid #8b5cf6; }
    .detail-content.show { display: block; animation: slideDown 0.25s; }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
    .substance-card { background: white; border-radius: 1rem; padding: 8px 4px; text-align: center; cursor: pointer; transition: 0.2s; border: 1px solid #e2e8f0; }
    .substance-card.active { border-color: #8b5cf6; background: #f3e8ff; transform: scale(0.98); }
    .ph-gradient-bar { background: linear-gradient(to right, #b91c1c,#dc2626,#ea580c,#d97706,#ca8a04,#4d7c0f,#16a34a,#0891b2,#0284c7,#1d4ed8,#4f46e5,#7c3aed,#6d28d9,#4c1d95,#1e0050); height: 10px; border-radius: 20px; }
    .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 1rem; overflow: hidden; background: #0f172a; }
    .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    .chat-message { background: #e2e8f0; border-radius: 1rem; padding: 8px 12px; margin-bottom: 8px; max-width: 85%; }
    .chat-message.user { background: #8b5cf6; color: white; margin-left: auto; }
    .menu-toggle { display: none; }
    @media (max-width: 768px) {
      .sidebar { position: fixed; z-index: 50; height: 100%; transform: translateX(-100%); transition: transform 0.3s ease; width: 280px !important; }
      .sidebar.mobile-open { transform: translateX(0); }
      .resize-handle, .toggle-sidebar-btn { display: none; }
      .menu-toggle { display: block; }
      .main-content { margin-left: 0 !important; width: 100%; }
    }
    .ph-scale-box { display: flex; height: 40px; border-radius: 20px; overflow: hidden; margin: 15px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .ph-segment { flex: 1; text-align: center; color: white; font-weight: bold; font-size: 12px; line-height: 40px; }
    .ion-diagram { display: flex; justify-content: center; align-items: center; gap: 20px; background: #1e293b; padding: 15px; border-radius: 20px; color: white; }
    .comp-bar-container { background: #e2e8f0; border-radius: 10px; height: 20px; width: 100%; margin: 10px 0; }
    .indicator-strip { display: flex; height: 30px; border-radius: 15px; overflow: hidden; margin: 8px 0; }
    .quiz-option { transition: all 0.15s; cursor: pointer; }
    .quiz-option:hover:not(:disabled) { background-color: #e0e7ff; }
    .badge-guru { background: linear-gradient(135deg,#f59e0b,#ef4444); }
    .badge-murid { background: linear-gradient(135deg,#06b6d4,#8b5cf6); }
  </style>
</head>
<body>

<!-- ===================== AUTH OVERLAY ===================== -->
<div id="auth-overlay">
  <!-- Floating particles -->

  <div class="auth-card">
    <!-- Logo -->

      <div style="width:60px;height:60px;background:linear-gradient(135deg,#ec4899,#8b5cf6);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><line x1="2" y1="12" x2="22" y2="12"/></svg>

      <div class="auth-input-group">

<script>
// ======================= AUTH SYSTEM =======================
const GURU_SECRET = 'CHEM2026';
let selectedRole = 'murid';

function getUsers() {
  const stored = localStorage.getItem('chemedu_users');
  if (!stored) {
    // Seed default accounts
    const defaults = [
      { username: 'guru_demo', password: 'guru123', nama: 'Guru Demo', role: 'guru' },
      { username: 'murid_demo', password: 'murid123', nama: 'Murid Demo', role: 'murid' }
    ];
    localStorage.setItem('chemedu_users', JSON.stringify(defaults));
    return defaults;
  }
  return JSON.parse(stored);
}

function saveUsers(users) {
  localStorage.setItem('chemedu_users', JSON.stringify(users));
}

function switchTab(tab) {
  document.getElementById('form-login').classList.toggle('active', tab === 'login');
  document.getElementById('form-register').classList.toggle('active', tab === 'register');
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  clearMessages();
}

function clearMessages() {
  ['login-error','reg-error','reg-success'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.style.display = 'none'; el.textContent = ''; }
  });
}

function showMsg(id, msg) {
  const el = document.getElementById(id);
  if (el) { el.textContent = msg; el.style.display = 'block'; }
}

function togglePwd(inputId) {
  const input = document.getElementById(inputId);
  input.type = input.type === 'password' ? 'text' : 'password';
}

function selectRole(role) {
  selectedRole = role;
  document.getElementById('role-murid').classList.toggle('selected', role === 'murid');
  document.getElementById('role-guru').classList.toggle('selected', role === 'guru');
  document.getElementById('guru-code-box').style.display = role === 'guru' ? 'block' : 'none';
}

function doLogin() {
  clearMessages();
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  if (!username || !password) { showMsg('login-error', '⚠️ Isi username dan password terlebih dahulu!'); return; }
  const users = getUsers();
  const user = users.find(u => u.username === username && u.password === password);
  if (!user) { showMsg('login-error', '❌ Username atau password salah. Coba lagi atau daftar akun baru.'); return; }
  currentUser = { username: user.username, nama: user.nama, role: user.role };
  document.getElementById('auth-overlay').classList.add('hidden');
  initApp();
}

function doRegister() {
  clearMessages();
  const username = document.getElementById('reg-username').value.trim();
  const nama = document.getElementById('reg-nama').value.trim();
  const password = document.getElementById('reg-password').value;
  const confirm = document.getElementById('reg-confirm').value;
  const guruCode = document.getElementById('reg-guru-code')?.value.trim();

  if (!username || !nama || !password || !confirm) { showMsg('reg-error', '⚠️ Semua kolom wajib diisi!'); return; }
  if (username.length < 4) { showMsg('reg-error', '⚠️ Username minimal 4 karakter.'); return; }
  if (!/^[a-zA-Z0-9_]+$/.test(username)) { showMsg('reg-error', '⚠️ Username hanya boleh huruf, angka, dan underscore (_).'); return; }
  if (password.length < 6) { showMsg('reg-error', '⚠️ Password minimal 6 karakter.'); return; }
  if (password !== confirm) { showMsg('reg-error', '⚠️ Konfirmasi password tidak cocok.'); return; }
  if (selectedRole === 'guru' && guruCode !== GURU_SECRET) { showMsg('reg-error', '🔒 Kode guru salah! Hubungi pengajar Anda.'); return; }

  const users = getUsers();
  if (users.find(u => u.username === username)) { showMsg('reg-error', '❌ Username sudah digunakan. Coba username lain.'); return; }

  users.push({ username, password, nama, role: selectedRole });
  saveUsers(users);
  showMsg('reg-success', `✅ Akun berhasil dibuat! Silakan masuk dengan username: ${username}`);
  document.getElementById('reg-username').value = '';
  document.getElementById('reg-nama').value = '';
  document.getElementById('reg-password').value = '';
  document.getElementById('reg-confirm').value = '';
  setTimeout(() => switchTab('login'), 1800);
}

  function buildMicroParticles() {

    let alpha = 0;
    if (sub.type === 'strong_acid' || sub.type === 'strong_base') {
      alpha = 1.0;
    } else if ((sub.type === 'weak_acid' || sub.type === 'weak_acid_salt') && sub.ka) {

    }

      if (isAcid || sub.id === 'air') {

          x: Math.random() * microW, y: Math.random() * microH,
          vx: (Math.random() - 0.5) * 1.3, vy: (Math.random() - 0.5) * 1.3,
          r: 7, color: '#f87171', label: 'H⁺', type: 'ion_h'
        });
      }
      if (isBase || sub.id === 'air') {
        microParticles.push({
          x: Math.random() * microW, y: Math.random() * microH,
          vx: (Math.random() - 0.5) * 1.3, vy: (Math.random() - 0.5) * 1.3,
          r: 7, color: '#34d399', label: 'OH⁻', type: 'ion_oh'
        });
      }
      // For strong acids: also show counter-ion (Cl⁻, SO₄²⁻, etc.)
      if (sub.type === 'strong_acid') {
        microParticles.push({
          x: Math.random() * microW, y: Math.random() * microH,
          vx: (Math.random() - 0.5) * 1.0, vy: (Math.random() - 0.5) * 1.0,
          r: 7, color: '#fb923c', label: 'A⁻', type: 'ion_anion'
        });
      }
      // For strong bases: show metal cation
      if (sub.type === 'strong_base') {
        microParticles.push({
          x: Math.random() * microW, y: Math.random() * microH,
          vx: (Math.random() - 0.5) * 1.0, vy: (Math.random() - 0.5) * 1.0,
          r: 7, color: '#facc15', label: 'M⁺', type: 'ion_cation'
        });
      }
    }

    // Legend
    const legend = microContainer.querySelector('#micro-legend');
    if (legend) {
      const items = [{ color: '#38bdf8', label: 'H₂O (pelarut)' }];
      if (nMolecule > 0) items.push({ color: '#a78bfa', label: sub.formula + ' (belum terionisasi)' });
      if (nIonized > 0) {
        if (isAcid || sub.id === 'air') items.push({ color: '#f87171', label: 'H⁺ (ion asam)' });
        if (isAcid && sub.type === 'strong_acid') items.push({ color: '#fb923c', label: 'A⁻ (anion)' });
        if (isBase || sub.id === 'air') items.push({ color: '#34d399', label: 'OH⁻ (ion basa)' });
        if (isBase && sub.type === 'strong_base') items.push({ color: '#facc15', label: 'M⁺ (kation logam)' });
      }
      legend.innerHTML = items.map(t =>
        `<span class="flex items-center gap-1"><span style="display:inline-block;width:11px;height:11px;border-radius:50%;background:${t.color};border:1px solid rgba(255,255,255,0.3)"></span>${t.label}</span>`
      ).join('');
    }

    // Description
    const desc = microContainer.querySelector('#micro-desc');
    if (desc) {
      const pctStr = pct >= 99.5 ? '100' : pct.toFixed(2);
      if (sub.id === 'air') desc.textContent = 'Air murni: autoionisasi sangat kecil (10⁻⁷ M). Hampir semua partikel adalah molekul H₂O utuh.';
      else if (sub.type === 'strong_acid') desc.textContent = `${sub.name} asam kuat → ionisasi sempurna (α = 100%). Setiap molekul melepas H⁺ dan anion A⁻ ke larutan.`;
      else if (sub.type === 'strong_base') desc.textContent = `${sub.name} basa kuat → ionisasi sempurna (α = 100%). Setiap molekul menghasilkan kation M⁺ dan OH⁻.`;
      else if (sub.type === 'weak_acid') desc.textContent = `${sub.name} asam lemah → ionisasi parsial α ≈ ${pctStr}% pada [${conc.toFixed(4)} M]. Sebagian besar masih molekul, sebagian kecil melepas H⁺.`;
      else if (sub.type === 'weak_base') desc.textContent = `${sub.name} basa lemah → ionisasi parsial α ≈ ${pctStr}% pada [${conc.toFixed(4)} M]. Sebagian besar masih molekul, sebagian kecil menghasilkan OH⁻.`;
      else desc.textContent = `${sub.name} (${sub.formula}) — ionisasi parsial α ≈ ${pctStr}% dalam larutan.`;
    }
    renderIonizationJourney(alpha, sub);
  }

  function renderIonizationJourney(alpha, sub) {
    if (!microContainer) return;
    const strip = microContainer.querySelector('#ion-journey-strip');
    if (!strip) return;

    // 5 stages: 0%, 25%, 50%, 75%, 100%
    const stages = [0, 0.25, 0.5, 0.75, 1.0];
    const isAcid = sub.type === 'strong_acid' || sub.type === 'weak_acid' || sub.type === 'weak_acid_salt';
    const isBase = sub.type === 'strong_base' || sub.type === 'weak_base';
    const ionLabel = isAcid ? 'H⁺' : 'OH⁻';
    const ionColor = isAcid ? '#f87171' : '#34d399';
    const molColor = '#a78bfa';
    const waterColor = '#38bdf8';
    const formula = sub.formula || '?';
    const shortLabel = formula.length > 5 ? 'HA' : formula;

    // Find which stage is closest to current alpha
    const currentStageIdx = stages.reduce((best, s, i) =>
      Math.abs(s - alpha) < Math.abs(stages[best] - alpha) ? i : best, 0);

    strip.innerHTML = '';

    stages.forEach((stageAlpha, si) => {
      const nTotal = 6;
      const nIon = Math.round(stageAlpha * nTotal);
      const nMol = nTotal - nIon;
      const pct = Math.round(stageAlpha * 100);
      const isCurrent = si === currentStageIdx;

      // Particle grid positions inside beaker
      const molPositions = [
        [18,44],[36,44],[54,44],
        [18,60],[36,60],[54,60]
      ];
      const waterPos = [[12,14],[60,14],[36,27]];

      // Build SVG particles
      let circles = '';
      // Water dots
      waterPos.forEach(([x,y]) => {
        circles += `<circle cx="${x}" cy="${y}" r="5" fill="${waterColor}" opacity="0.7" stroke="white" stroke-width="0.5"/>`;
      });
      // Molecules (purple)
      for (let i = 0; i < nMol; i++) {
        const [x,y] = molPositions[i];
        circles += `<circle cx="${x}" cy="${y}" r="7" fill="${molColor}" opacity="0.9" stroke="white" stroke-width="0.8"/>`;
        circles += `<text x="${x}" y="${y+2.5}" font-size="4.5" text-anchor="middle" fill="white" font-weight="bold" font-family="monospace">${shortLabel}</text>`;
      }
      // Ions (red/green)
      for (let i = 0; i < nIon; i++) {
        const [x,y] = molPositions[nMol + i];
        circles += `<circle cx="${x}" cy="${y}" r="6" fill="${ionColor}" opacity="0.9" stroke="white" stroke-width="0.8"/>`;
        circles += `<text x="${x}" y="${y+2.5}" font-size="4.5" text-anchor="middle" fill="white" font-weight="bold" font-family="monospace">${ionLabel}</text>`;
      }

      const svgHTML = `<svg width="68" height="84" viewBox="0 0 72 90" xmlns="http://www.w3.org/2000/svg">
        <rect x="6" y="6" width="60" height="76" rx="5" fill="#0f172a"/>
        <rect x="7" y="7" width="58" height="74" rx="4" fill="none" stroke="${isCurrent ? '#8b5cf6' : '#334155'}" stroke-width="${isCurrent ? 2 : 1}"/>
        ${circles}
      </svg>`;

      // Calculate what concentration to set when clicked for this stage alpha
      // For strong acid/base alpha is always 1, clicking shows info only
      // For weak acid: alpha = sqrt(Ka/C) → C = Ka/alpha²
      // For weak base: alpha = sqrt(Kb/C) → C = Kb/alpha²
      let targetConc = currentConc;
      if (stageAlpha > 0 && stageAlpha < 1) {
        if ((sub.type === 'weak_acid' || sub.type === 'weak_acid_salt') && sub.ka) {
          targetConc = Math.min(1, Math.max(0.0001, sub.ka / (stageAlpha * stageAlpha)));
        } else if (sub.type === 'weak_base' && sub.kb) {
          targetConc = Math.min(1, Math.max(0.0001, sub.kb / (stageAlpha * stageAlpha)));
        }
      } else if (stageAlpha === 0) {
        targetConc = 1.0; // very high conc → low alpha for weak
      } else if (stageAlpha === 1.0) {
        targetConc = 0.0001; // very low conc → higher alpha for weak
      }

      const cell = document.createElement('div');
      cell.style.cssText = [
        'min-width:78px', 'flex:1', 'display:flex', 'flex-direction:column',
        'align-items:center', 'border-radius:14px', 'padding:7px 4px 6px',
        'cursor:pointer', 'user-select:none',
        'transition:all 0.18s ease',
        `background:${isCurrent ? 'linear-gradient(135deg,#ede9fe,#fce7f3)' : '#f8fafc'}`,
        `border:2px solid ${isCurrent ? '#8b5cf6' : '#e2e8f0'}`,
        `box-shadow:${isCurrent ? '0 4px 14px rgba(139,92,246,0.25)' : 'none'}`
      ].join(';');

      // Build innerHTML WITHOUT event handlers (to avoid XSS/scope issues)
      cell.innerHTML = svgHTML +
        `<div style="font-size:10px;font-weight:700;color:${isCurrent?'#7c3aed':'#475569'};margin-top:4px">α = ${pct}%</div>` +
        `<div style="font-size:9px;color:${isCurrent?'#9333ea':'#94a3b8'};margin-top:1px">${nMol}mol · ${nIon}ion</div>` +
        (isCurrent ? `<div style="font-size:8px;background:#8b5cf6;color:white;border-radius:8px;padding:2px 6px;margin-top:3px;font-weight:600">✓ saat ini</div>` : '');

      // Attach click event directly on DOM element (not via innerHTML)
      cell.addEventListener('click', () => {
        if (sub.type === 'strong_acid' || sub.type === 'strong_base') {
          // Strong: always 100%, clicking just shows tooltip
          alert(`${sub.name} adalah asam/basa KUAT → selalu terionisasi 100% (α = 1) pada semua konsentrasi.`);
          return;
        }
        if (sub.id === 'air') return;

        // Update concentration
        currentConc = targetConc;
        // Update slider UI
        const slider = microContainer.querySelector('#conc-slider');
        const concVal = microContainer.querySelector('#conc-val');
        if (slider) slider.value = currentConc;
        if (concVal) concVal.textContent = currentConc.toFixed(4) + ' M';
        // Trigger full UI update
        updateSimUI(microContainer);
      });

      // Hover effect
      cell.addEventListener('mouseenter', () => {
        if (!isCurrent) { cell.style.background = '#f3e8ff'; cell.style.borderColor = '#c4b5fd'; }
      });
      cell.addEventListener('mouseleave', () => {
        if (!isCurrent) { cell.style.background = '#f8fafc'; cell.style.borderColor = '#e2e8f0'; }
      });

      strip.appendChild(cell);

      // Arrow
      if (si < stages.length - 1) {
        const arrow = document.createElement('div');
        arrow.style.cssText = 'display:flex;align-items:center;justify-content:center;color:#a78bfa;font-size:20px;font-weight:bold;padding:0 2px;flex-shrink:0;align-self:center';
        arrow.textContent = '→';
        strip.appendChild(arrow);
      }
    });
  }

  function drawMicroFrame() {
    if (!microCtx) return;
    const ctx = microCtx;
    ctx.clearRect(0, 0, microW, microH);
    // Background dots grid
    ctx.fillStyle = 'rgba(255,255,255,0.03)';
    for (let x = 20; x < microW; x += 30) for (let y = 15; y < microH; y += 30) { ctx.beginPath(); ctx.arc(x, y, 1, 0, Math.PI*2); ctx.fill(); }

    microParticles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < p.r) { p.x = p.r; p.vx = Math.abs(p.vx); }
      if (p.x > microW - p.r) { p.x = microW - p.r; p.vx = -Math.abs(p.vx); }
      if (p.y < p.r) { p.y = p.r; p.vy = Math.abs(p.vy); }
      if (p.y > microH - p.r) { p.y = microH - p.r; p.vy = -Math.abs(p.vy); }

      // Glow
      const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 2.2);
      grd.addColorStop(0, p.color + 'aa');
      grd.addColorStop(1, p.color + '00');
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r * 2.2, 0, Math.PI * 2);
      ctx.fillStyle = grd; ctx.fill();

      // Sphere with highlight
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.color; ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.35)'; ctx.lineWidth = 1; ctx.stroke();
      // Shine
      ctx.beginPath(); ctx.arc(p.x - p.r * 0.3, p.y - p.r * 0.3, p.r * 0.3, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.fill();

      // Label (not for water)
      if (p.type !== 'water') {
        ctx.fillStyle = '#fff';
        ctx.font = `bold ${Math.max(6, p.r - 2)}px sans-serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(p.label, p.x, p.y);
      }
    });
    microAnimFrame = requestAnimationFrame(drawMicroFrame);
  }
  function updateSimUI(container) {
    let ph = computePH(currentSub, currentConc);
    if (isNaN(ph)) ph = 7;
    container.querySelector('#ph-number').innerText = ph.toFixed(2);
    let h3o = Math.pow(10, -ph), oh = Math.pow(10, -(14-ph));
    container.querySelector('#h3o-val').innerHTML = formatSci(h3o);
    container.querySelector('#oh-val').innerHTML = formatSci(oh);
    let status = ph<4 ? "Asam Kuat" : (ph<6.5 ? "Asam" : (ph<=7.5 ? "Netral" : (ph<10.5 ? "Basa" : "Basa Kuat")));
    let badge = container.querySelector('#ph-status');
    badge.innerText = `${status} (pH ${ph.toFixed(2)})`;
    badge.style.backgroundColor = ph<6.5 ? "#fee2e2" : (ph>7.5 ? "#e0f2fe" : "#e2e8f0");
    let color = getPhColor(ph);
    container.querySelector('#liquid-fill').setAttribute('fill', color+'99');
    let thermoH = 20 + (ph/14)*35;
    let thermo = container.querySelector('#thermo-fill');
    thermo.setAttribute('height', Math.min(thermoH,55));
    thermo.setAttribute('y', 74-thermoH);
    container.querySelector('#ph-cursor').style.left = (ph/14)*100+'%';
    container.querySelector('#indicator-text').innerText = getIndicatorDesc(ph);
    buildMicroParticles();
  }

  if (alreadySubmitted) { const scoreData = studentScores.find(s => s.username === username); if (scoreData) savedAnswers = scoreData.answers || []; }
  container.innerHTML = `<div class="glass-card p-6"><h3 class="text-xl font-bold mb-3 text-purple-800">📝 Ujian Sumatif (10 Soal)</h3><div id="quiz-area"></div>${!alreadySubmitted ? '<button id="submit-sumatif" class="mt-5 bg-purple-600 text-white px-5 py-2 rounded-xl">Kumpulkan Jawaban</button>' : '<div class="mt-4 p-3 bg-green-100 rounded-xl text-green-800">✅ Anda telah menyelesaikan sumatif. Tidak dapat mengulang.</div>'}</div>`;
  const quizArea = container.querySelector('#quiz-area');
  let studentAnswers = new Array(10).fill(null);
  function renderQuestions(answers = null) {
    quizArea.innerHTML = '';
    soalBank.forEach((q, idx) => {
      const selected = answers ? answers[idx] : null;
      const div = document.createElement('div'); div.className = "bg-white p-4 rounded-xl border mb-3 shadow-sm";
      div.innerHTML = `<div class="font-bold text-indigo-700">${idx+1}. ${q.q}</div><div class="grid grid-cols-2 gap-2 mt-2" id="q-${idx}">${q.opts.map((o,i)=>`<button class="sum-opt text-left p-2 rounded-lg border text-sm" data-q="${idx}" data-val="${i}" ${answers?'disabled':''}>${String.fromCharCode(65+i)}. ${o}</button>`).join('')}</div>`;
      quizArea.appendChild(div);
      if (selected !== undefined && selected !== null) {
        const optsDiv = div.querySelector(`#q-${idx}`);
        optsDiv.querySelectorAll('button').forEach(btn => { const val=parseInt(btn.dataset.val); if(val===soalBank[idx].correct) btn.classList.add('bg-green-100'); if(val===selected&&val!==soalBank[idx].correct) btn.classList.add('bg-red-100'); });
      }
    });
    if (!answers && !alreadySubmitted) {
      document.querySelectorAll('.sum-opt').forEach(btn => {
        btn.addEventListener('click', () => { const qIdx=parseInt(btn.dataset.q); const sel=parseInt(btn.dataset.val); studentAnswers[qIdx]=sel; document.getElementById(`q-${qIdx}`).querySelectorAll('button').forEach(b=>b.classList.remove('bg-blue-100')); btn.classList.add('bg-blue-100'); });
      });
    }
  }
  if (alreadySubmitted && savedAnswers.length) renderQuestions(savedAnswers); else renderQuestions();
  const submitBtn = container.querySelector('#submit-sumatif');
  if (submitBtn && !alreadySubmitted) {
    submitBtn.addEventListener('click', () => {
      if (studentAnswers.some(a => a === null)) { alert("Jawab semua soal terlebih dahulu!"); return; }
      let score = 0; studentAnswers.forEach((ans, i) => { if (ans === soalBank[i].correct) score++; });
      studentScores.push({ username, nama: currentUser.nama, score, timestamp: new Date().toISOString(), answers: [...studentAnswers] });
      studentSubmitted[username] = true;
      localStorage.setItem('chemedu_scores', JSON.stringify(studentScores));
      localStorage.setItem('chemedu_submitted', JSON.stringify(studentSubmitted));
      alert(`Nilai Anda: ${score}/10. Jawaban telah disimpan.`);
      renderSumatifMurid(container);
    });
  }
}

// ========== GENERATE SOAL ==========
function renderGenerate(container) {
  container.innerHTML = `<div class="glass-card p-6"><h3 class="text-xl font-bold mb-3 text-purple-800">✨ Generate Soal Acak (Pilihan Ganda)</h3><button id="gen-soal-btn" class="bg-indigo-600 text-white px-5 py-2 rounded-xl mb-4">🎲 Generate Soal Baru</button><div id="gen-output" class="p-4 bg-white rounded-xl border min-h-[60px]"></div></div>`;
  const genBtn = container.querySelector('#gen-soal-btn');
  const genOutput = container.querySelector('#gen-output');
  function loadRandomSoal() {
    const soal = { ...generateBank[Math.floor(Math.random() * generateBank.length)] };
    genOutput.innerHTML = '';
    const qDiv = document.createElement('div'); qDiv.className = 'font-bold mb-3 text-purple-800'; qDiv.textContent = '📌 ' + soal.q; genOutput.appendChild(qDiv);
    const optsDiv = document.createElement('div'); optsDiv.className = 'space-y-2'; genOutput.appendChild(optsDiv);
    const fbDiv = document.createElement('div'); fbDiv.className = 'mt-3 text-sm p-3 rounded-lg border-l-4 hidden'; genOutput.appendChild(fbDiv);
    let answered = false;
    soal.opts.forEach((opt, i) => {
      const btn = document.createElement('button'); btn.className = 'gen-opt-btn w-full text-left p-2 rounded-lg border text-sm hover:bg-purple-50 transition'; btn.textContent = String.fromCharCode(65+i)+'. '+opt; btn.dataset.idx = i; optsDiv.appendChild(btn);
      btn.addEventListener('click', () => {
        if (answered) return; answered = true;
        const selected = parseInt(btn.dataset.idx); const isCorrect = selected === soal.correct;
        optsDiv.querySelectorAll('.gen-opt-btn').forEach(b => { b.disabled=true; const bIdx=parseInt(b.dataset.idx); if(bIdx===soal.correct) b.classList.add('bg-green-100','border-green-500','font-bold'); else if(bIdx===selected&&!isCorrect) b.classList.add('bg-red-100','border-red-400'); });
        fbDiv.classList.remove('hidden'); fbDiv.className = 'mt-3 text-sm p-3 rounded-lg border-l-4 '+(isCorrect?'bg-green-50 border-green-500':'bg-red-50 border-red-500');
        fbDiv.innerHTML = `<div class="font-bold text-base mb-1">${isCorrect?'✅ Benar!':'❌ Salah!'}</div>${!isCorrect?`<div class="mb-1 text-green-700 font-semibold">✔ Jawaban benar: <strong>${String.fromCharCode(65+soal.correct)}. ${soal.opts[soal.correct]}</strong></div>`:''}<div class="font-semibold text-gray-700 mt-1">📖 Penyelesaian:</div><div class="mt-1 text-gray-800">${soal.expl}</div>`;
      });
    });
  }
  genBtn.addEventListener('click', loadRandomSoal); loadRandomSoal();
}

let menuItems = [];
function initApp() {
  const isGuru = currentUser.role === 'guru';
  menuItems = [
    { id:'petunjuk', icon:'help-circle', label:'Petunjuk', render:renderPetunjuk },
    { id:'materi', icon:'book-open', label:'Materi', render:(c)=>renderMateri(c,isGuru) },
    { id:'simulasi', icon:'flask-conical', label:'Simulasi pH', render:renderSimulasi },
    { id:'diskusi', icon:'message-square', label:'Diskusi', render:renderDiskusi },
    { id:'generatesoal', icon:'sparkles', label:'Generate Soal', render:renderGenerate },
    { id:'sumatif', icon:'clipboard-list', label:'Sumatif', render:(c)=>isGuru?renderSumatifGuru(c):renderSumatifMurid(c) },
    { id:'refleksi', icon:'heart', label:'Refleksi', render:renderRefleksi },
    { id:'webdev', icon:'code', label:'Web Development', render:renderWebDev }
  ];
  const sidebarMenu = document.getElementById('sidebar-menu');
  sidebarMenu.innerHTML = '';
  menuItems.forEach(item => {
    const div = document.createElement('div'); div.className='sidebar-item'; div.dataset.page=item.id;
    div.innerHTML=`<i data-lucide="${item.icon}" class="w-5 h-5"></i><span>${item.label}</span>`;
    div.onclick = () => {
      document.querySelectorAll('.sidebar-item').forEach(i=>i.classList.remove('active')); div.classList.add('active');
      document.getElementById('page-title').innerText = item.label;
      if (microAnimFrame) { cancelAnimationFrame(microAnimFrame); microAnimFrame=null; }
      item.render(document.getElementById('page-content'));
      lucide.createIcons();
      if (item.id==='simulasi'&&simContainer) setTimeout(()=>updateSimUI(simContainer),50);
      autoCollapseSidebar();
    };
    sidebarMenu.appendChild(div);
  });
  // Badge role
  const badge = document.getElementById('role-badge');
  if (badge) {
    badge.textContent = isGuru ? '👨‍🏫 Guru' : '👩‍🎓 Murid';
    badge.className = `text-xs px-3 py-1 rounded-full font-semibold text-white ${isGuru ? 'badge-guru' : 'badge-murid'}`;
  }
  document.getElementById('user-info').innerHTML = `<div class="user-info-text">👤 ${currentUser.nama||currentUser.username}</div><div class="user-info-text text-violet-500 text-[10px]">${currentUser.role}</div>`;
  document.querySelector('.sidebar-item').click();
  lucide.createIcons();
}

document.getElementById('menuToggle')?.addEventListener('click', () => sidebar.classList.toggle('mobile-open'));
document.getElementById('logout-btn')?.addEventListener('click', () => {
  currentUser = null;
  document.getElementById('auth-overlay').classList.remove('hidden');
  document.getElementById('page-content').innerHTML = '';
  document.getElementById('sidebar-menu').innerHTML = '';
  document.getElementById('user-info').innerHTML = '';
  document.getElementById('login-username').value = '';
  document.getElementById('login-password').value = '';
  clearMessages();
});

window.toggleDetail = (id) => { const el=document.getElementById(id); if(el) el.classList.toggle('show'); };
</script>
</body>
</html>
